name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Nightly rebuild so the changelog picks up new FAC releases automatically.
  schedule:
    - cron: '30 2 * * *'
  # Instant sync: the FAC release pipeline can fire this event on publish.
  repository_dispatch:
    types: [fac-release]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # for lastUpdated

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build
        env:
          # Rate-limit headroom for the changelog release fetch (public reads).
          GITHUB_TOKEN: ${{ github.token }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
