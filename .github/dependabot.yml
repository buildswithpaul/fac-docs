version: 2
updates:
  # npm dependencies (VitePress and build tooling)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      # Batch minor/patch bumps into one PR to reduce noise
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the deploy workflow
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
